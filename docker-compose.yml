services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"

  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["python", "daily_job.py", "--loop"]

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
